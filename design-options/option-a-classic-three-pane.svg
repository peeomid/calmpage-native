  <g transform="translate(520 220)">
    <text x="0" y="0" font-family="New York, Georgia, serif" font-size="44" font-weight="650" fill="#1f1a14">Apple Native UI Design</text>
    <text x="0" y="62" font-family="New York, Georgia, serif" font-size="19" fill="#332c25">CalmPage should feel like a quiet Mac reading room: fast, organized, and focused.</text>
    <text x="0" y="116" font-family="New York, Georgia, serif" font-size="18" fill="#332c25">The reader owns the center. Library work stays in the sidebar, and document structure lives in the inspector.</text>
    <rect x="0" y="154" width="620" height="1" fill="#ded3c5"/>
    <text x="0" y="206" font-family="New York, Georgia, serif" font-size="28" font-weight="650" fill="#241e18">Folder indexing</text>
    <text x="0" y="250" font-family="New York, Georgia, serif" font-size="18" fill="#332c25">Adding a folder must never freeze the interface. New files stream in while SQLite updates in batches.</text>
    <rect x="0" y="296" width="620" height="92" rx="10" fill="#f0e5d6" stroke="#dac9b5"/>
    <text x="22" y="330" font-family="SF Mono, Menlo, monospace" font-size="14" fill="#6f4a26">Indexing 12,842 markdown files…</text>
    <rect x="22" y="350" width="500" height="8" rx="4" fill="#d8c8b5"/><rect x="22" y="350" width="278" height="8" rx="4" fill="#8b5a2b"/>
  </g>

  <rect x="1280" y="114" width="250" height="828" fill="#f1ebe3"/>
  <text x="1304" y="154" font-family="-apple-system" font-size="17" font-weight="650" fill="#2d261f">Contents</text>
