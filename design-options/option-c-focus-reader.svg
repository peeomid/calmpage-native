<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#000" flood-opacity="0.34"/></filter></defs>
  <rect width="1600" height="1000" fill="#0c1117"/>
  <rect x="70" y="58" width="1460" height="884" rx="18" fill="#0f1720" stroke="#223241" filter="url(#shadow)"/>
  <rect x="70" y="58" width="1460" height="52" rx="18" fill="#111923"/>
  <circle cx="100" cy="84" r="7" fill="#ff5f57"/><circle cx="124" cy="84" r="7" fill="#febc2e"/><circle cx="148" cy="84" r="7" fill="#28c840"/>
  <rect x="650" y="72" width="300" height="28" rx="14" fill="#172536" stroke="#304457"/><text x="724" y="91" font-family="-apple-system" font-size="13" fill="#9bd1ee">Focus Mode · Cmd .</text>
  <rect x="1220" y="72" width="88" height="28" rx="8" fill="#172536"/><text x="1242" y="91" font-family="-apple-system" font-size="13" fill="#9bd1ee">Aa</text>
  <rect x="1320" y="72" width="112" height="28" rx="8" fill="#172536"/><text x="1342" y="91" font-family="-apple-system" font-size="13" fill="#9bd1ee">Contents</text>

  <rect x="70" y="110" width="1460" height="832" fill="#0f1720"/>
  <g transform="translate(402 168)">
    <text x="0" y="0" font-family="New York, Georgia, serif" font-size="54" font-weight="650" fill="#e7edf3">A Quiet Reading Surface</text>
    <text x="0" y="68" font-family="New York, Georgia, serif" font-size="21" fill="#c8d3dc">Focus mode removes chrome, keeps typography controls nearby, and makes headings searchable with one key.</text>
    <rect x="0" y="118" width="792" height="1" fill="#27394a"/>
    <text x="0" y="180" font-family="New York, Georgia, serif" font-size="20" fill="#e7edf3">The native app should not feel like a web reader inside a Mac window. It should feel like a document app built for long reading: calm text, predictable shortcuts, and no frozen states.</text>
    <text x="0" y="248" font-family="New York, Georgia, serif" font-size="20" fill="#e7edf3">When a folder is added, indexing continues in the background. The current note stays readable. The user can keep scrolling, search existing metadata, or cancel the scan.</text>
    <text x="0" y="330" font-family="New York, Georgia, serif" font-size="34" font-weight="650" fill="#e7edf3">Reading controls</text>
    <text x="0" y="382" font-family="New York, Georgia, serif" font-size="20" fill="#e7edf3">Typography lives in a small floating strip, not as permanent clutter. The defaults must already be good.</text>
    <rect x="0" y="438" width="792" height="120" rx="14" fill="#141f2d" stroke="#2a3e52"/>
    <text x="28" y="480" font-family="SF Mono, Menlo, monospace" font-size="15" fill="#9bd1ee">Preset: Editorial · 18pt · 68ch · line 1.64</text>
    <rect x="28" y="508" width="310" height="8" rx="4" fill="#26384a"/><rect x="28" y="508" width="190" height="8" rx="4" fill="#7fb7d7"/>
    <rect x="380" y="508" width="310" height="8" rx="4" fill="#26384a"/><rect x="380" y="508" width="238" height="8" rx="4" fill="#7fb7d7"/>
  </g>

  <rect x="112" y="170" width="190" height="52" rx="14" fill="#172536" stroke="#304457"/><text x="136" y="202" font-family="-apple-system" font-size="14" fill="#d9e8f1">Library hidden</text>
  <rect x="1268" y="170" width="190" height="260" rx="14" fill="#121d2a" stroke="#2a3e52"/>
  <text x="1292" y="204" font-family="-apple-system" font-size="16" font-weight="650" fill="#e7edf3">Contents</text>
  <g font-family="-apple-system" font-size="13" fill="#a6b3be"><text x="1292" y="246">Quiet Reading Surface</text><text x="1308" y="280">Reading controls</text><text x="1308" y="314">Indexing rules</text><text x="1308" y="348">Keyboard flow</text></g>
  <rect x="1268" y="468" width="190" height="44" rx="14" fill="#172536" stroke="#304457"/><text x="1300" y="496" font-family="-apple-system" font-size="13" fill="#9bd1ee">/ Search headings</text>
  <text x="80" y="975" font-family="-apple-system" font-size="18" font-weight="700" fill="#9bd1ee">Option C · Focus Reader First</text>
</svg>
